proxy-providers:
  heyo:
    type: http
    url: "https://mpreium.com:2096/api/wn3sgnuus43rfaw2"
    path: ./provider/heyo.yaml
    interval: 3600
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - REJECT
    use:
      - heyo