mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info

proxies:
  - name: "MALAYSIA VIP"
    type: vless
    server: malay.hydracore.tech
    port: 443
    uuid: 381bfae3-bc61-4b39-ae1b-2dffccb30683
    network: ws
    tls: true
    udp: true
    servername: malay.hydracore.tech
    client-fingerprint: chrome
    alpn: [h2, http/1.1]
    skip-cert-verify: true
    ws-opts:
      path: "/playing-services"
      headers:
        Host: malay.hydracore.tech

  - name: "MALAYSIA VVIP"
    type: vless
    server: malay.hydracore.tech
    port: 8080
    uuid: 381bfae3-bc61-4b39-ae1b-2dffccb30683
    network: httpupgrade
    tls: false
    udp: true
    http-opts:
      method: GET
      path: ["/mideaservices"]
      headers:
        Host: ["malay.hydracore.tech"]

proxy-groups:
  - name: GLOBAL
    type: select
    proxies:
      - MALAYSIA VIP
      - MALAYSIA VVIP
      - DIRECT
      - REJECT
    selected: MALAYSIA VVIP

rules:
  - GEOIP,CN,DIRECT
  - MATCH,GLOBAL