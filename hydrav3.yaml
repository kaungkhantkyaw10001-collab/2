proxy-providers:
  hydrav3:
    type: http
    url: "https://mpreium.com:2096/api/0ueud3jsfloc0vtz"
    path: /provider/hydrav3.yaml
    interval: 3600
    health-check:
      enable: true
      url: "http://www.gstatic.com/generate_204"
      interval: 600
    auto_update: true

proxies:
  - name: "THAI VIP-443"
    type: vless
    server: thai.hydracore.tech
    port: 443
    uuid: 061c0006-2207-49ce-81df-06d855cf248f
    network: grpc
    tls: true
    udp: true
    servername: thai.hydracore.tech
    client-fingerprint: chrome
    alpn:
      - "h2"
      - "http/1.1"
    grpc-opts:
      grpc-service-name: "Premium-Service"
    skip-cert-verify: true
    encryption: none

  - name: "THAI VVIP-8080"
    type: vless
    server: thai.hydracore.tech
    port: 8080
    uuid: 061c0006-2207-49ce-81df-06d855cf248f
    network: http
    tls: false
    udp: true
    http-opts:
      path:
        - "/playing-services"
      headers:
        Host:
          - "thai.hydracore.tech"
    skip-cert-verify: true
    encryption: none

  - name: "MALAYSIA VIP-443"
    type: vless
    server: malay.hydracore.tech
    port: 443
    uuid: 061c0006-2207-49ce-81df-06d855cf248f
    network: ws
    tls: true
    udp: true
    servername: malay.hydracore.tech
    client-fingerprint: chrome
    alpn:
      - "h2"
      - "http/1.1"
    ws-opts:
      path: "/playing-services"
      headers:
        Host: "malay.hydracore.tech"
    skip-cert-verify: true
    encryption: none

  - name: "MALAYSIA VVIP-8080"
    type: vless
    server: malay.hydracore.tech
    port: 8080
    uuid: 061c0006-2207-49ce-81df-06d855cf248f
    network: http
    tls: false
    udp: true
    http-opts:
      path:
        - "/mideaservices"
      headers:
        Host:
          - "malay.hydracore.tech"
    skip-cert-verify: true
    encryption: none

  - name: "TH 189-443"
    type: vless
    server: th.hydracore.tech
    port: 443
    uuid: 061c0006-2207-49ce-81df-06d855cf248f
    network: http
    tls: true
    udp: true
    servername: th.hydracore.tech
    client-fingerprint: chrome
    alpn:
      - "h2"
      - "http/1.1"
      - "h3"
    http-opts:
      path:
        - "/mediastreaming"
      headers:
        Host:
          - "th.hydracore.tech"
    skip-cert-verify: true
    encryption: none

  - name: "JPv2-443"
    type: vless
    server: jp.mmpremium.tech
    port: 443
    uuid: 061c0006-2207-49ce-81df-06d855cf248f
    network: xhttp
    tls: true
    udp: true
    servername: jp.mmpremium.tech
    client-fingerprint: chrome
    alpn:
      - "h2"
      - "http/1.1"
      - "h3"
    http-opts:
      path:
        - "/gaming-services/"
      headers:
        Host:
          - "jp.mmpremium.tech"
    plugin-opts:
      mode: auto
      x_padding_bytes: "100-1000"
    skip-cert-verify: true
    encryption: none

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - "THAI VIP-443"
      - "THAI VVIP-8080"
      - "MALAYSIA VIP-443"
      - "MALAYSIA VVIP-8080"
      - "TH 189-443"
      - "JPv2-443"
      - "♻️ AUTO"
    use:
      - hydrav3

  - name: ♻️ AUTO
    type: url-test
    use:
      - hydrav3
    url: "http://www.gstatic.com/generate_204"
    interval: 600

rules:
  - IP-CIDR,224.0.0.0/4,DIRECT
  - DST-PORT,5353,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,PROXY